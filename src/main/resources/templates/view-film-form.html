<!DOCTYPE html>
<!--<html th:replace="~{layouts/layout :: layout(~{::main}, 
						contenuPage=~{:: main},
						ressourcesSupp=~{:: #ressources-css})}">
-->
<html th:replace="~{layouts/layout :: layout(~{::main}, 'Ajouter un film')}" xmlns:th="http://www.thymeleaf.org">
<body>
    <main>
        <a th:href="@{/films}">Toutes les films</a>

        <h2>Ajouter un nouveau film</h2>

        <form th:action="@{/films/enregistrer}" th:object="${film}" method="post">
            
            <div th:if="${#fields.hasAnyErrors()}" style="color: red; margin-bottom: 15px;">
                <ul>
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>

            <div>
                <label for="titre">Nom du film :</label>
                <input type="text" id="titre" th:field="*{titre}" />
            </div>

            <div>
                <label>Genres :</label>
                <div th:each="genre : ${allGenres}">
                    <input type="checkbox" th:field="*{genres}" th:value="${genre.id}" th:id="${'genre-' + genre.id}" />
                    <label th:for="${'genre-' + genre.id}" th:text="${genre.titre}"></label>
                </div>
            </div>

            <div>
                <label for="duree">Durée (en minutes) :</label>
                <input type="number" id="duree" th:field="*{duree}" />
            </div>

            <div>
                <label for="sypnosis">Résumé :</label>
                <textarea id="synopsis" th:field="*{synopsis}"></textarea>
            </div>

            <div>
                <label for="poster">Lien du poster :</label>
                <input type="text" id="poster" th:field="*{poster}" />
            </div>

            <button type="submit">Enregistrer le film</button>
        </form>
        
        <a th:href="@{/films}">Retour à la liste</a>
    </main>
</body>
</html>
