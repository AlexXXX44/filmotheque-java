<!DOCTYPE html>
<html th:replace="~{layouts/layout :: layout(~{::main}, 'Ajouter une série')}" xmlns:th="http://www.thymeleaf.org">
<style>
    form {
        display: flex;
        flex-direction: column;
        gap: 1em;
        max-width: 400px;
    }
    label {
        font-weight: bold;
    }
    input[type="text"], textarea {
        width: 100%;
        padding: 0.5em;
    }
    button {
        align-self: flex-start;
        padding: 0.5em 1em;
    }
    .genres-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin: 10px 0;
    }
    .genre-item {
    display: flex;
    align-items: center;
    }
    .genre-item input {
    margin-right: 5px;
    }
</style>
<body>
    <main>
        <h2>Ajouter une nouvelle série</h2>

        <form th:action="@{/series/save}" th:object="${serie}" method="post">
            
            <div>
                <label><strong>Genres :</strong></label>
                <div th:each="genre : ${allGenres}">
                    <input type="checkbox" 
                        th:field="*{genres}" 
                        th:value="${genre.id}" 
                        th:id="${'genre-' + genre.id}" />
                    <label th:for="${'genre-' + genre.id}" th:text="${genre.titre}"></label>
                </div>
            </div>
            
    <div>
        <label>Titre :</label>
        <input type="text" th:field="*{name}" />
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
    </div>

    <div>
        <label>Résumé :</label>
        <textarea th:field="*{overview}"></textarea>
        <span th:if="${#fields.hasErrors('overview')}" th:errors="*{overview}" style="color:red;"></span>
    </div>
    
    <div th:if="${#fields.hasErrors('genres')}" th:errors="*{genres}" style="color:red;"></div>

           <button type="submit" onclick="console.log('Tentative d envoi...')">Enregistrer</button>
</form>
        
        <a th:href="@{/series}">Retour à la liste</a>
    </main>
</body>
</html>
</form>
</body>
</html>
